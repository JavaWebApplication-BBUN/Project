spring.application.name=BusTicketSystem
 
# Database Configuration (use environment variables with defaults for dev)
spring.datasource.url=jdbc:mysql://localhost:3306/bus_ticket_pro?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASS:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:BusTicketSystemSecretKeyForJWT2024MustBe256BitsLongOrMore}
jwt.expiration-ms=86400000

# PayOS Configuration
PAYOS_CLIENT_ID=cf20686e-f91c-4ed4-8335-3c25b2618a07
PAYOS_API_KEY=3a9e801e-6b3d-4c53-8087-2c8ab02c2a8e
PAYOS_CHECKSUM_KEY=966876ae861505f8450b229995bd5bfded034134bf796827f3e8a216971d4e3b
# Thay thế domain này bằng ngrok URL của bạn khi chạy local
PAYOS_WEBHOOK_DOMAIN=https://overhand-drudge-ice.ngrok-free.dev
