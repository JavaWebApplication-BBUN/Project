<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Vé - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .ticket-card {
            border: 2px dashed #0d6efd;
            border-radius: 10px;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🚌 Bus Ticket Pro</a>
        <div id="navRight">
            <a href="/" class="btn btn-outline-light btn-sm me-2">Tìm Chuyến</a>
            <a href="/login" class="btn btn-outline-light btn-sm">Đăng nhập</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm mb-4 mx-auto" style="max-width: 600px;">
        <div class="card-body">
            <h4 class="card-title text-primary text-center mb-4">Tra Cứu Vé Điện Tử</h4>
            <form id="searchTicketForm">
                <div class="mb-3">
                    <label class="form-label">Mã Vé</label>
                    <input type="text" id="ticketCode" class="form-control" placeholder="Ví dụ: T3DCD32C" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Số Điện Thoại Đặt Vé</label>
                    <input type="text" id="customerPhone" class="form-control" placeholder="Nhập số điện thoại" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Tra Cứu</button>
            </form>
        </div>
    </div>

    <div id="resultContainer" class="d-none mx-auto" style="max-width: 800px;">
        <!-- Kết quả tra cứu sẽ hiển thị ở đây -->
    </div>
</div>

<script>
    const token = localStorage.getItem('jwt_token');
    if (token && token !== 'undefined' && token !== 'null') {
        fetch('/api/auth/me', {
            headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(res => {
            if (res.status === 401) {
                localStorage.removeItem('jwt_token');
                localStorage.removeItem('user_role');
                return null;
            }
            return res.ok ? res.json() : null;
        })
        .then(user => {
            if (user) {
                const navRight = document.getElementById('navRight');
                navRight.innerHTML = `
                    <a href="/" class="btn btn-outline-light btn-sm me-2">Tìm Chuyến Khác</a>
                    <span class="text-white me-3">Xin chào, ${user.fullName}</span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">Đăng xuất</button>
                `;
            }
        });
    } else {
        localStorage.removeItem('jwt_token');
        localStorage.removeItem('user_role');
    }

    function logout() {
        localStorage.removeItem('jwt_token');
        localStorage.removeItem('user_role');
        window.location.reload();
    }

    document.getElementById('searchTicketForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const ticketCode = document.getElementById('ticketCode').value.trim();
        const customerPhone = document.getElementById('customerPhone').value.trim();
        const container = document.getElementById('resultContainer');
        const btn = document.querySelector('button[type="submit"]');
        
        btn.disabled = true;
        btn.innerText = 'Đang tìm kiếm...';
        
        fetch(`/api/tickets/search?ticketCode=${ticketCode}&customerPhone=${customerPhone}`)
            .then(res => res.json().then(data => ({status: res.status, body: data})))
            .then(res => {
                btn.disabled = false;
                btn.innerText = 'Tra Cứu';
                
                if (res.status !== 200 || !res.body || res.body.length === 0) {
                    container.classList.remove('d-none');
                    container.innerHTML = `<div class="alert alert-danger">${res.body.message || 'Không tìm thấy vé hợp lệ!'}</div>`;
                    return;
                }

                container.classList.remove('d-none');
                container.innerHTML = '<h5 class="text-success text-center mb-3">Vé hợp lệ! Thông tin chi tiết:</h5>';
                
                res.body.forEach(ticket => {
                    let statusBadge = '';
                    let cancelBtn = '';
                    
                    if (ticket.status === 'PENDING') {
                        statusBadge = '<span class="badge bg-warning text-dark">Chờ thanh toán</span>';
                        cancelBtn = `<button class="btn btn-outline-danger btn-sm mt-2" onclick="cancelTicket('${ticket.ticketCode}', '${ticket.customerPhone}')">Hủy vé</button>`;
                    } else if (ticket.status === 'PAID') {
                        statusBadge = '<span class="badge bg-success">Đã thanh toán</span>';
                        cancelBtn = `<button class="btn btn-outline-danger btn-sm mt-2" onclick="cancelTicket('${ticket.ticketCode}', '${ticket.customerPhone}')">Hủy vé</button>`;
                    } else {
                        statusBadge = '<span class="badge bg-secondary">Hủy</span>';
                    }
                    
                    const html = `
                        <div class="ticket-card p-4 mb-4 shadow-sm">
                            <div class="row">
                                <div class="col-md-8 border-end border-primary">
                                    <h4 class="text-primary mb-3">${ticket.routeStart} ➔ ${ticket.routeEnd}</h4>
                                    <p class="mb-1"><strong>Khách hàng:</strong> ${ticket.customerName} - ${ticket.customerPhone}</p>
                                    <p class="mb-1"><strong>Thời gian đi:</strong> ${ticket.departureTime.replace('T', ' ')}</p>
                                    <p class="mb-1"><strong>Xe:</strong> ${ticket.busPlate} (Tài xế: ${ticket.driverName})</p>
                                    <p class="mb-1"><strong>Ngày đặt:</strong> ${ticket.bookingTime.replace('T', ' ')}</p>
                                </div>
                                <div class="col-md-4 text-center d-flex flex-column justify-content-center">
                                    <h5 class="text-muted mb-0">MÃ VÉ</h5>
                                    <h3 class="text-primary fw-bold">${ticket.ticketCode}</h3>
                                    <h5 class="text-muted mt-2 mb-0">GHẾ</h5>
                                    <h2 class="text-danger fw-bold">${ticket.seatNumber}</h2>
                                    <div class="mt-2">${statusBadge}</div>
                                    <h5 class="text-success mt-2">${ticket.totalPrice.toLocaleString()} VNĐ</h5>
                                    ${cancelBtn}
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += html;
                });
            })
            .catch(err => {
                btn.disabled = false;
                btn.innerText = 'Tra Cứu';
                container.classList.remove('d-none');
                container.innerHTML = `<div class="alert alert-danger">Đã có lỗi xảy ra khi gọi API.</div>`;
            });
    });

    function cancelTicket(ticketCode, customerPhone) {
        if (!confirm("Bạn có chắc chắn muốn hủy vé này không? Lưu ý: Chỉ được hủy trước giờ xe chạy 12 tiếng.")) return;
        
        fetch(`/api/tickets/cancel?ticketCode=${ticketCode}&customerPhone=${customerPhone}`, {
            method: 'POST'
        })
        .then(res => res.json().then(data => ({status: res.status, body: data})))
        .then(res => {
            if (res.status === 200) {
                alert(res.body.message);
                document.getElementById('searchTicketForm').dispatchEvent(new Event('submit'));
            } else {
                alert("Lỗi: " + (res.body.message || "Không thể hủy vé."));
            }
        })
        .catch(err => {
            alert("Đã xảy ra lỗi khi kết nối với máy chủ.");
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
