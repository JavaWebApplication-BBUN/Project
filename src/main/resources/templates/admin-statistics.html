<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống Kê Doanh Thu - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f6f9; }
        .sidebar { background-color: #343a40; min-height: 100vh; color: white; }
        .sidebar a { color: #c2c7d0; text-decoration: none; display: block; padding: 12px 20px; }
        .sidebar a:hover, .sidebar a.active { background-color: #495057; color: white; border-left: 4px solid #0d6efd; }
        .main-content { padding: 30px; }
        .stat-card { border: none; border-radius: 12px; color: white; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .bg-gradient-primary { background: linear-gradient(45deg, #0d6efd, #0dcaf0); }
        .bg-gradient-success { background: linear-gradient(45deg, #198754, #20c997); }
        .bg-gradient-warning { background: linear-gradient(45deg, #fd7e14, #ffc107); }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .card-header { background-color: white; border-bottom: 1px solid #f0f0f0; font-weight: bold; color: #495057; padding: 15px 20px; border-radius: 12px 12px 0 0 !important; }
        .chart-container { position: relative; height: 350px; width: 100%; padding: 15px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 px-0 sidebar d-none d-md-block">
            <div class="p-3 bg-dark text-center">
                <h5 class="mb-0 text-info fw-bold">Bus Ticket Pro</h5>
            </div>
            <div class="mt-3">
                <a href="/admin/buses"><i class="fa fa-bus me-2"></i> Quản lý xe</a>
                <a href="/admin/routes"><i class="fa fa-route me-2"></i> Tuyến đường</a>
                <a href="/admin/statistics" class="active"><i class="fa fa-chart-pie me-2"></i> Thống kê</a>
                <a href="#" onclick="logout()" class="text-danger mt-5"><i class="fa fa-sign-out-alt me-2"></i> Đăng xuất</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 main-content">
            <h3 class="fw-bold text-dark mb-4">Tổng Quan Thống Kê</h3>

            <!-- Summary Cards -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="stat-card bg-gradient-success">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-uppercase mb-1 opacity-75">Tổng Doanh Thu</h6>
                                <h3 class="mb-0 fw-bold" id="totalRevenue">0 ₫</h3>
                            </div>
                            <i class="fa fa-money-bill-wave fa-2x opacity-50"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card bg-gradient-primary">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-uppercase mb-1 opacity-75">Số Vé Đã Bán</h6>
                                <h3 class="mb-0 fw-bold" id="totalTickets">0</h3>
                            </div>
                            <i class="fa fa-ticket-alt fa-2x opacity-50"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card bg-gradient-warning">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-uppercase mb-1 opacity-75">Tuyến Đường</h6>
                                <h3 class="mb-0 fw-bold" id="totalRoutes">0</h3>
                            </div>
                            <i class="fa fa-route fa-2x opacity-50"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="row">
                <div class="col-md-7">
                    <div class="card h-100">
                        <div class="card-header"><i class="fa fa-chart-bar me-2 text-primary"></i> Doanh Thu Theo Tháng</div>
                        <div class="card-body">
                            <div class="chart-container">
                                <canvas id="revenueByMonthChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="card h-100">
                        <div class="card-header"><i class="fa fa-chart-pie me-2 text-success"></i> Tỷ Trọng Doanh Thu Tuyến Đường</div>
                        <div class="card-body">
                            <div class="chart-container">
                                <canvas id="revenueByRouteChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Top 5 Trips Table -->
            <div class="row mt-4">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header"><i class="fa fa-fire me-2 text-danger"></i> Top 5 Chuyến Xe Hot Nhất</div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Hạng</th>
                                        <th>Tuyến Đường</th>
                                        <th>Ngày Giờ Khởi Hành</th>
                                        <th class="text-end pe-4">Số Lượt Đặt</th>
                                    </tr>
                                    </thead>
                                    <tbody id="topTripsTableBody">
                                        <!-- Dữ liệu JS load vào đây -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE = '/api/admin/statistics';
    
    function authHeaders() {
        const token = localStorage.getItem('jwt_token');
        return {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
        };
    }

    document.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('jwt_token');
        if (!token) {
            window.location.href = '/login';
            return;
        }
        
        loadSummary();
        loadRevenueByMonth();
        loadRevenueByRoute();
        loadTopTrips();
    });

    function loadSummary() {
        fetch(`${API_BASE}/summary`, { headers: authHeaders() })
            .then(res => {
                if (res.status === 401 || res.status === 403) {
                    logout();
                    throw new Error('Unauthorized');
                }
                return res.json();
            })
            .then(data => {
                document.getElementById('totalRevenue').textContent = data.totalRevenue.toLocaleString() + ' ₫';
                document.getElementById('totalTickets').textContent = data.totalTickets;
                document.getElementById('totalRoutes').textContent = data.totalRoutes;
            })
            .catch(err => console.error(err));
    }

    function loadRevenueByMonth() {
        fetch(`${API_BASE}/revenue-by-month`, { headers: authHeaders() })
            .then(res => res.json())
            .then(data => {
                const labels = data.map(item => `Tháng ${item[1]}/${item[0]}`);
                const values = data.map(item => item[2]);

                const ctx = document.getElementById('revenueByMonthChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Doanh Thu (VNĐ)',
                            data: values,
                            backgroundColor: 'rgba(13, 110, 253, 0.7)',
                            borderColor: 'rgba(13, 110, 253, 1)',
                            borderWidth: 1,
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return value.toLocaleString() + ' đ';
                                    }
                                }
                            }
                        }
                    }
                });
            })
            .catch(err => console.error(err));
    }

    function loadRevenueByRoute() {
        fetch(`${API_BASE}/revenue-by-route`, { headers: authHeaders() })
            .then(res => res.json())
            .then(data => {
                const labels = data.map(item => item[0]);
                const values = data.map(item => item[1]);
                
                // Bảng màu đẹp
                const backgroundColors = [
                    '#0d6efd', '#198754', '#fd7e14', '#dc3545', '#6f42c1', '#20c997', '#ffc107'
                ];

                const ctx = document.getElementById('revenueByRouteChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: backgroundColors.slice(0, labels.length),
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '70%',
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            })
            .catch(err => console.error(err));
    }

    function loadTopTrips() {
        fetch(`${API_BASE}/top-trips`, { headers: authHeaders() })
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('topTripsTableBody');
                tbody.innerHTML = '';
                
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted p-4">Chưa có dữ liệu chuyến xe nào.</td></tr>`;
                    return;
                }
                
                data.forEach((item, index) => {
                    // item = [tripId, routeName, departureTime, count]
                    const dateObj = new Date(item[2]);
                    const formattedDate = dateObj.toLocaleString('vi-VN');
                    
                    let badgeClass = 'bg-secondary';
                    if (index === 0) badgeClass = 'bg-danger';
                    else if (index === 1) badgeClass = 'bg-warning text-dark';
                    else if (index === 2) badgeClass = 'bg-primary';

                    tbody.innerHTML += `
                        <tr>
                            <td class="ps-4"><span class="badge ${badgeClass} fs-6 rounded-pill px-3">#${index + 1}</span></td>
                            <td class="fw-semibold text-dark">${item[1]}</td>
                            <td>${formattedDate}</td>
                            <td class="text-end pe-4 fw-bold text-success">${item[3]} vé</td>
                        </tr>
                    `;
                });
            })
            .catch(err => console.error(err));
    }

    function logout() {
        localStorage.removeItem('jwt_token');
        localStorage.removeItem('user_role');
        window.location.href = '/login';
    }
</script>
</body>
</html>
