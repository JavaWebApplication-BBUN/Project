<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Danh Mục Xe - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar { background-color: #343a40; min-height: 100vh; color: white; }
        .sidebar a { color: #c2c7d0; text-decoration: none; display: block; padding: 12px 20px; }
        .sidebar a:hover, .sidebar a.active { background-color: #495057; color: white; border-left: 4px solid #0d6efd; }
        .main-content { padding: 30px; }
        .card { border: none; box-shadow: 0 0 10px rgba(0,0,0,0.05); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 px-0 sidebar d-none d-md-block">
            <div class="p-3 bg-dark text-center">
                <h5 class="mb-0 text-info fw-bold">Bus Ticket Pro</h5>
            </div>
            <div class="mt-3">
                <a href="/admin/buses" class="active"><i class="fa fa-bus me-2"></i> Quản lý xe</a>
                <a href="#"><i class="fa fa-route me-2"></i> Tuyến đường (Seed)</a>
                <a href="#"><i class="fa fa-chart-pie me-2"></i> Thống kê</a>
                <a href="#" onclick="logout()" class="text-danger mt-5"><i class="fa fa-sign-out-alt me-2"></i> Đăng xuất</a>
            </div>
        </div>

        <div class="col-md-10 main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">Danh Mục Xe Khách</h3>
                <button class="btn btn-primary" onclick="openAddModal()">
                    <i class="fa fa-plus me-2"></i>Thêm Xe Mới
                </button>
            </div>

            <div id="globalAlert" class="alert d-none" role="alert"></div>

            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Biển Số Xe</th>
                                <th>Loại Xe</th>
                                <th>Tổng Số Ghế</th>
                                <th class="text-end pe-4">Hành Động</th>
                            </tr>
                            </thead>
                            <tbody id="busTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="busModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="modalTitle">Thêm Xe Mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="modalAlert" class="alert alert-danger d-none" role="alert"></div>
                <form id="busForm">
                    <input type="hidden" id="busId">
                    <div class="mb-3">
                        <label class="form-label">Biển số xe</label>
                        <input type="text" class="form-control" id="plateNumber" placeholder="VD: 29B-123.45" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Loại xe</label>
                        <select class="form-select" id="busType" required>
                            <option value="Giường nằm 40 chỗ">Giường nằm 40 chỗ</option>
                            <option value="Ghế ngồi 29 chỗ">Ghế ngồi 29 chỗ</option>
                            <option value="Limousine 11 chỗ">Limousine 11 chỗ</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tổng số ghế</label>
                        <input type="number" class="form-control" id="totalSeats" min="1" required>
                    </div>
                    <div class="modal-footer px-0 pb-0">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary" id="btnSave">Lưu lại</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = '/api/admin/buses';
    let busModal;

    // Helper: lấy JWT headers cho mọi fetch call
    function authHeaders(extra = {}) {
        const token = localStorage.getItem('jwt_token');
        return {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
            ...extra
        };
    }

    // Kiểm tra JWT khi tải trang - nếu không có token thì redirect về login
    document.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('jwt_token');
        if (!token) {
            window.location.href = '/login';
            return;
        }

        busModal = new bootstrap.Modal(document.getElementById('busModal'));
        loadBuses();

        // Lắng nghe sự kiện submit form
        document.getElementById('busForm').addEventListener('submit', handleFormSubmit);
    });

    function loadBuses() {
        fetch(API_URL, {
            headers: authHeaders()
        })
            .then(res => {
                if (res.status === 401 || res.status === 403) {
                    localStorage.removeItem('jwt_token');
                    localStorage.removeItem('user_role');
                    window.location.href = '/login';
                    return [];
                }
                return res.json();
            })
            .then(data => {
                if (!data) return;
                const tbody = document.getElementById('busTableBody');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center p-4 text-muted">Chưa có xe nào trong hệ thống.</td></tr>`;
                    return;
                }

                data.forEach(bus => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="ps-4 fw-bold">${bus.id}</td>
                            <td><span class="badge bg-secondary px-2 py-1 fs-6">${bus.plateNumber}</span></td>
                            <td>${bus.busType}</td>
                            <td>${bus.totalSeats} ghế</td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm btn-outline-warning me-1" onclick="openEditModal(${bus.id})">
                                    <i class="fa fa-edit"></i> Sửa
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteBus(${bus.id})">
                                    <i class="fa fa-trash"></i> Xóa
                                </button>
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(err => showAlert('danger', 'Không thể kết nối API danh sách xe!'));
    }

    function openAddModal() {
        document.getElementById('modalTitle').textContent = 'Thêm Xe Mới';
        document.getElementById('busForm').reset();
        document.getElementById('busId').value = '';
        document.getElementById('modalAlert').classList.add('d-none');
        busModal.show();
    }

    function openEditModal(id) {
        document.getElementById('modalTitle').textContent = 'Cập Nhật Thông Tin Xe';
        document.getElementById('modalAlert').classList.add('d-none');

        fetch(`${API_URL}/${id}`, {
            headers: authHeaders()
        })
            .then(res => res.json())
            .then(bus => {
                document.getElementById('busId').value = bus.id;
                document.getElementById('plateNumber').value = bus.plateNumber;
                document.getElementById('busType').value = bus.busType;
                document.getElementById('totalSeats').value = bus.totalSeats;
                busModal.show();
            })
            .catch(err => showAlert('danger', 'Không lấy được thông tin chi tiết xe!'));
    }

    function handleFormSubmit(e) {
        e.preventDefault();

        const id = document.getElementById('busId').value;
        const data = {
            plateNumber: document.getElementById('plateNumber').value,
            busType: document.getElementById('busType').value,
            totalSeats: parseInt(document.getElementById('totalSeats').value)
        };

        // Nếu id có giá trị -> Chạy PUT (Sửa), ngược lại chạy POST (Thêm)
        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/${id}` : API_URL;

        fetch(url, {
            method: method,
            headers: authHeaders(),
            body: JSON.stringify(data)
        })
            .then(async res => {
                if (res.ok) {
                    const msg = id ? 'Cập nhật thông tin xe thành công!' : 'Thêm xe mới thành công!';
                    showAlert('success', msg);
                    busModal.hide();
                    loadBuses();
                } else {
                    const errData = await res.json();
                    const modalAlert = document.getElementById('modalAlert');
                    modalAlert.textContent = errData.message || "Xử lý thất bại, hãy kiểm tra lại dữ liệu!";
                    modalAlert.classList.remove('d-none');
                }
            })
            .catch(err => showAlert('danger', 'Lỗi hệ thống không thể lưu thông tin!'));
    }

    function deleteBus(id) {
        if (confirm('Bạn có chắc chắn muốn xóa xe này khỏi danh mục không?')) {
            fetch(`${API_URL}/${id}`, {
                method: 'DELETE',
                headers: authHeaders()
            })
                .then(async res => {
                    if (res.ok) {
                        showAlert('success', 'Đã xóa xe thành công khỏi danh mục!');
                        loadBuses();
                    } else {
                        const errData = await res.json();
                        showAlert('danger', errData.message || "Không thể xóa xe này!");
                    }
                })
                .catch(err => showAlert('danger', 'Lỗi hệ thống, không thể thực hiện lệnh xóa!'));
        }
    }

    // Đăng xuất: xóa token và redirect
    function logout() {
        localStorage.removeItem('jwt_token');
        localStorage.removeItem('user_role');
        window.location.href = '/login';
    }

    // Hàm hỗ trợ hiển thị alert thông báo nhanh
    function showAlert(type, message) {
        const alert = document.getElementById('globalAlert');
        alert.className = `alert alert-${type}`;
        alert.textContent = message;
        alert.classList.remove('d-none');
        setTimeout(() => alert.classList.add('d-none'), 4000);
    }
</script>
</body>
</html>
