<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .auth-card { max-width: 400px; margin: 100px auto; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="card auth-card">
        <div class="card-body p-4">
            <h3 class="text-center mb-4 text-primary">Đăng Nhập</h3>

            <div id="alertBox" class="alert d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">Đăng Nhập</button>
                <div class="text-center">
                    Chưa có tài khoản? <a href="/register" class="text-decoration-none">Đăng ký tại đây</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const data = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        const alertBox = document.getElementById('alertBox');

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
            .then(async response => {
                const isJson = response.headers.get('content-type')?.includes('application/json');
                const result = isJson ? await response.json() : await response.text();

                if (response.ok) {
                    alertBox.className = 'alert alert-success';
                    alertBox.textContent = result.message;
                    alertBox.classList.remove('d-none');

                    setTimeout(() => {
                        if (result.role === 'ADMIN') {
                            window.location.href = '/admin/buses';
                        } else if (result.role === 'STAFF') {
                            window.location.href = '/staff/tickets';
                        } else {
                            window.location.href = '/';
                        }
                    }, 1000);
                } else {
                    alertBox.className = 'alert alert-danger';
                    alertBox.textContent = result.message || result || "Sai thông tin đăng nhập!";
                }
                alertBox.classList.remove('d-none');
            })
            .catch(error => {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = "Không thể kết nối đến máy chủ!";
                alertBox.classList.remove('d-none');
            });
    });
</script>
</body>
</html>
