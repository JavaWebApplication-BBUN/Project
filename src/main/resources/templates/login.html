<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .auth-card { max-width: 400px; margin: 100px auto; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="card auth-card">
        <div class="card-body p-4">
            <h3 class="text-center mb-4 text-primary">Đăng Nhập</h3>

            <div id="alertBox" class="alert d-none" role="alert"></div>

            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" class="form-control" id="username" required>
                    <div class="invalid-feedback">Vui lòng nhập tên đăng nhập.</div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" id="password" required>
                    <div class="invalid-feedback">Vui lòng nhập mật khẩu.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">Đăng Nhập</button>
                <div class="text-center">
                    Chưa có tài khoản? <a href="/register" class="text-decoration-none">Đăng ký tại đây</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    [usernameInput, passwordInput].forEach(input => {
        input.addEventListener('input', () => {
            if (input.value.trim() !== "") {
                input.classList.remove('is-invalid');
                input.classList.add('is-valid');
            } else {
                input.classList.remove('is-valid');
                input.classList.add('is-invalid');
            }
        });
    });

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        let isValid = true;
        [usernameInput, passwordInput].forEach(input => {
            if (input.value.trim() === "") {
                input.classList.add('is-invalid');
                isValid = false;
            } else {
                input.classList.remove('is-invalid');
                input.classList.add('is-valid');
            }
        });

        if (!isValid) {
            return;
        }

        const username = usernameInput.value;
        const password = passwordInput.value;
        const errorDiv = document.getElementById('alertBox');

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username, password }),
            });

            const data = await response.json();

            if (response.ok) {
                // 1. Lưu token và vai trò vào localStorage (đồng bộ với các trang khác)
                localStorage.setItem('jwt_token', data.token);
                localStorage.setItem('user_role', data.role);

                // 2. Kiểm tra vai trò và chuyển hướng
                if (data.role === 'ADMIN') {
                    window.location.href = '/admin/buses';
                } else if (data.role === 'STAFF') {
                    window.location.href = '/staff/tickets';
                } else {
                    // Mặc định chuyển về trang chủ cho các vai trò khác (PASSENGER)
                    window.location.href = '/';
                }
            } else {
                // Hiển thị lỗi từ server
                errorDiv.classList.remove('d-none');
                errorDiv.classList.add('alert-danger');
                errorDiv.textContent = data.message || 'Đăng nhập thất bại. Vui lòng thử lại.';
            }
        } catch (error) {
            console.error('Lỗi khi đăng nhập:', error);
            errorDiv.textContent = 'Đã xảy ra lỗi kết nối. Vui lòng thử lại.';
            errorDiv.classList.remove('d-none');
            errorDiv.classList.add('alert-danger');
        }
    });
</script>
</body>
</html>
