<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Tuyến Đường - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar { background-color: #343a40; min-height: 100vh; color: white; }
        .sidebar a { color: #c2c7d0; text-decoration: none; display: block; padding: 12px 20px; }
        .sidebar a:hover, .sidebar a.active { background-color: #495057; color: white; border-left: 4px solid #0d6efd; }
        .main-content { padding: 30px; }
        .card { border: none; box-shadow: 0 0 10px rgba(0,0,0,0.05); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 px-0 sidebar d-none d-md-block">
            <div class="p-3 bg-dark text-center">
                <h5 class="mb-0 text-info fw-bold">Bus Ticket Pro</h5>
            </div>
            <div class="mt-3">
                <a href="/admin/buses"><i class="fa fa-bus me-2"></i> Quản lý xe</a>
                <a href="/admin/routes" class="active"><i class="fa fa-route me-2"></i> Tuyến đường</a>
                <a href="/admin/statistics"><i class="fa fa-chart-pie me-2"></i> Thống kê</a>
                <a href="#" onclick="logout()" class="text-danger mt-5"><i class="fa fa-sign-out-alt me-2"></i> Đăng xuất</a>
            </div>
        </div>

        <div class="col-md-10 main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">Danh Mục Tuyến Đường</h3>
                <button class="btn btn-primary" onclick="openAddModal()">
                    <i class="fa fa-plus me-2"></i>Thêm Tuyến Đường
                </button>
            </div>

            <div id="globalAlert" class="alert d-none" role="alert"></div>

            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Điểm Đi</th>
                                <th>Điểm Đến</th>
                                <th>Khoảng Cách (Km)</th>
                                <th class="text-end pe-4">Hành Động</th>
                            </tr>
                            </thead>
                            <tbody id="routeTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="routeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="modalTitle">Thêm Tuyến Đường</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="modalAlert" class="alert alert-danger d-none" role="alert"></div>
                <form id="routeForm" novalidate>
                    <input type="hidden" id="routeId">
                    <div class="mb-3">
                        <label class="form-label">Điểm Đi</label>
                        <select class="form-select" id="fromLocation" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Điểm Đến</label>
                        <select class="form-select" id="toLocation" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Khoảng Cách (Km)</label>
                        <input type="number" step="0.1" class="form-control" id="distanceKm" required>
                        <div class="invalid-feedback">Khoảng cách phải lớn hơn 0.</div>
                    </div>
                    <div class="modal-footer px-0 pb-0">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary" id="btnSave">Lưu lại</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = '/api/admin/routes';
    let routeModal;
    let locations = [];

    function authHeaders(extra = {}) {
        const token = localStorage.getItem('jwt_token');
        return {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
            ...extra
        };
    }

    document.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('jwt_token');
        if (!token) {
            window.location.href = '/login';
            return;
        }
        routeModal = new bootstrap.Modal(document.getElementById('routeModal'));
        loadLocations();
        loadRoutes();
        document.getElementById('routeForm').addEventListener('submit', handleFormSubmit);
    });

    function loadLocations() {
        fetch(`${API_URL}/locations`, { headers: authHeaders() })
            .then(res => res.json())
            .then(data => {
                locations = data;
                populateLocationSelects();
            })
            .catch(err => console.error(err));
    }

    function populateLocationSelects() {
        let options = '<option value="">-- Chọn Tỉnh/Thành --</option>';
        locations.forEach(loc => {
            options += `<option value="${loc.id}">${loc.name}</option>`;
        });
        document.getElementById('fromLocation').innerHTML = options;
        document.getElementById('toLocation').innerHTML = options;
    }

    function loadRoutes() {
        fetch(API_URL, { headers: authHeaders() })
            .then(res => {
                if (res.status === 401 || res.status === 403) {
                    logout();
                    return [];
                }
                return res.json();
            })
            .then(data => {
                if (!data) return;
                const tbody = document.getElementById('routeTableBody');
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center p-4 text-muted">Chưa có tuyến đường nào trong hệ thống.</td></tr>`;
                    return;
                }
                data.forEach(route => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="ps-4 fw-bold">${route.id}</td>
                            <td><span class="fw-semibold text-primary">${route.fromLocationName}</span></td>
                            <td><span class="fw-semibold text-success">${route.toLocationName}</span></td>
                            <td>${route.distanceKm} km</td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm btn-outline-warning me-1" onclick="openEditModal(${route.id}, ${route.fromLocationId}, ${route.toLocationId}, ${route.distanceKm})">
                                    <i class="fa fa-edit"></i> Sửa
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteRoute(${route.id})">
                                    <i class="fa fa-trash"></i> Xóa
                                </button>
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(err => showAlert('danger', 'Không thể kết nối API danh sách tuyến đường!'));
    }

    function openAddModal() {
        document.getElementById('modalTitle').textContent = 'Thêm Tuyến Đường';
        document.getElementById('routeForm').reset();
        document.getElementById('routeId').value = '';
        document.getElementById('modalAlert').classList.add('d-none');
        routeModal.show();
    }

    function openEditModal(id, fromId, toId, distance) {
        document.getElementById('modalTitle').textContent = 'Cập Nhật Tuyến Đường';
        document.getElementById('modalAlert').classList.add('d-none');
        document.getElementById('routeId').value = id;
        document.getElementById('fromLocation').value = fromId;
        document.getElementById('toLocation').value = toId;
        document.getElementById('distanceKm').value = distance;
        routeModal.show();
    }

    function handleFormSubmit(e) {
        e.preventDefault();
        const id = document.getElementById('routeId').value;
        const fromId = document.getElementById('fromLocation').value;
        const toId = document.getElementById('toLocation').value;
        const distanceKm = document.getElementById('distanceKm').value;

        if (!fromId || !toId || !distanceKm || distanceKm <= 0) {
            showAlert('danger', 'Vui lòng điền đầy đủ và đúng thông tin!');
            return;
        }

        if (fromId === toId) {
            const modalAlert = document.getElementById('modalAlert');
            modalAlert.textContent = 'Điểm đi và điểm đến không được trùng nhau!';
            modalAlert.classList.remove('d-none');
            return;
        }

        const data = {
            fromLocationId: parseInt(fromId),
            toLocationId: parseInt(toId),
            distanceKm: parseFloat(distanceKm)
        };

        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/${id}` : API_URL;

        fetch(url, {
            method: method,
            headers: authHeaders(),
            body: JSON.stringify(data)
        })
            .then(async res => {
                if (res.ok) {
                    showAlert('success', id ? 'Cập nhật tuyến đường thành công!' : 'Thêm tuyến đường mới thành công!');
                    routeModal.hide();
                    loadRoutes();
                } else {
                    const errData = await res.json();
                    const modalAlert = document.getElementById('modalAlert');
                    modalAlert.textContent = errData.message || "Xử lý thất bại, hãy kiểm tra lại dữ liệu!";
                    modalAlert.classList.remove('d-none');
                }
            })
            .catch(err => showAlert('danger', 'Lỗi hệ thống không thể lưu thông tin!'));
    }

    function deleteRoute(id) {
        if (confirm('Bạn có chắc chắn muốn xóa tuyến đường này?')) {
            fetch(`${API_URL}/${id}`, {
                method: 'DELETE',
                headers: authHeaders()
            })
                .then(async res => {
                    if (res.ok) {
                        showAlert('success', 'Đã xóa tuyến đường thành công!');
                        loadRoutes();
                    } else {
                        const errData = await res.json();
                        showAlert('danger', errData.message || "Không thể xóa tuyến đường này!");
                    }
                })
                .catch(err => showAlert('danger', 'Lỗi hệ thống, không thể thực hiện lệnh xóa!'));
        }
    }

    function logout() {
        localStorage.removeItem('jwt_token');
        localStorage.removeItem('user_role');
        window.location.href = '/login';
    }

    function showAlert(type, message) {
        const alert = document.getElementById('globalAlert');
        alert.className = `alert alert-${type}`;
        alert.textContent = message;
        alert.classList.remove('d-none');
        setTimeout(() => alert.classList.add('d-none'), 4000);
    }
</script>
</body>
</html>
