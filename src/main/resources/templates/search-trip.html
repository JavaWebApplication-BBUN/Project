<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Chuyến Xe - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .seat { width: 50px; height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; border: 2px solid #dee2e6; margin: 5px; transition: 0.2s; }
        .seat.AVAILABLE { background-color: white; color: #198754; border-color: #198754; }
        .seat.AVAILABLE:hover { background-color: #d1e7dd; }
        .seat.SELECTED { background-color: #0d6efd; color: white; border-color: #0d6efd; }
        /* Disable ghế đang chờ thanh toán hoặc đã mua */
        .seat.PENDING, .seat.BOOKED { background-color: #e9ecef; color: #adb5bd; border-color: #dee2e6; cursor: not-allowed; }

        .seat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; justify-items: center; }
        .aisle { grid-column: span 4; height: 20px; } /* Lối đi giữa xe */
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🚌 Bus Ticket Pro</a>
        <div id="navRight">
            <a href="/search-ticket" class="btn btn-outline-light btn-sm me-2">Tra Cứu Vé</a>
            <a href="/login" class="btn btn-outline-light btn-sm" id="loginBtn">Đăng nhập</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h4 class="card-title text-primary mb-4">Hành trình của bạn</h4>
            <form id="searchForm" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Điểm Đi</label>
                    <select id="fromId" class="form-select" required>
                        <option value="">-- Chọn điểm đi --</option>
                        <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Điểm Đến</label>
                    <select id="toId" class="form-select" required>
                        <option value="">-- Chọn điểm đến --</option>
                        <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Ngày Khởi Hành</label>
                    <input type="date" id="date" class="form-control" required>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Tìm Chuyến</button>
                </div>
            </form>
        </div>
    </div>

    <div id="tripList" class="row g-3">
    </div>
</div>

<div class="modal fade" id="seatModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Sơ Đồ Ghế</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <div class="d-flex justify-content-center mb-3">
                    <span class="badge bg-success mx-1">Còn trống</span>
                    <span class="badge bg-primary mx-1">Đang chọn</span>
                    <span class="badge bg-secondary mx-1">Đã đặt/Đang chờ</span>
                </div>

                <div id="seatContainer" class="seat-grid bg-white p-3 border rounded">
                </div>
                
                <div id="bookingForm" class="d-none mt-3 text-start">
                    <hr>
                    <div id="authNotice" class="alert alert-warning d-none">Bạn cần đăng nhập để đặt vé.</div>
                    <div id="customerInfoInputs" class="d-none">
                        <h6 class="text-primary fw-bold">Thông tin hành khách</h6>
                        <div class="mb-2">
                            <label class="form-label">Họ tên</label>
                            <input type="text" id="custName" class="form-control" readonly>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" id="custPhone" class="form-control" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer justify-content-between">
                <div>Đang chọn: <strong id="selectedSeatLabel" class="text-primary">Chưa chọn</strong></div>
                <button type="button" class="btn btn-success d-none" id="btnContinueBook">Tiếp Tục Đặt Vé</button>
                <a href="/login" class="btn btn-primary d-none" id="btnLoginToBook">Đăng nhập để Đặt Vé</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let seatModal = new bootstrap.Modal(document.getElementById('seatModal'));
    let selectedSeats = [];
    let selectedTripId = null;
    let currentUser = null;

    // Check login status
    const token = localStorage.getItem('jwt_token');
    if (token && token !== 'undefined' && token !== 'null') {
        fetch('/api/auth/me', {
            headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(res => {
            if (res.status === 401) {
                console.error('Token expired or invalid, clearing local storage.');
                localStorage.removeItem('jwt_token');
                localStorage.removeItem('user_role');
                return null;
            }
            return res.ok ? res.json() : null;
        })
        .then(user => {
            if (user) {
                currentUser = user;
                const navRight = document.getElementById('navRight');
                navRight.innerHTML = `
                    <a href="/search-ticket" class="btn btn-outline-light btn-sm me-2">Tra Cứu Vé</a>
                    <span class="text-white me-3">Xin chào, ${user.fullName}</span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">Đăng xuất</button>
                `;
            }
        });
    } else {
        localStorage.removeItem('jwt_token');
        localStorage.removeItem('user_role');
    }

    function logout() {
        localStorage.removeItem('jwt_token');
        localStorage.removeItem('user_role');
        window.location.reload();
    }

    // 1. Gửi Form tìm chuyến
    document.getElementById('searchForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const from = document.getElementById('fromId').value;
        const to = document.getElementById('toId').value;
        const date = document.getElementById('date').value;

        fetch(`/api/trips/search?fromId=${from}&toId=${to}&date=${date}`)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('tripList');
                list.innerHTML = '';
                if(data.length === 0) {
                    list.innerHTML = `<div class="alert alert-warning">Không tìm thấy chuyến xe nào trong ngày này.</div>`;
                    return;
                }

                data.forEach(trip => {
                    list.innerHTML += `
                        <div class="col-md-6">
                            <div class="card border-primary h-100">
                                <div class="card-body">
                                    <h5 class="card-title text-primary fw-bold">${trip.departureTime.replace('T', ' ')}</h5>
                                     <p class="mb-1"><strong>Xe:</strong> ${trip.busPlate} (${trip.busType})</p>
                                     <p class="mb-1"><strong>Tài xế:</strong> ${trip.driverName || 'Chưa phân công'}</p>
                                     <p class="mb-1 text-danger fw-bold">Giá: ${trip.price.toLocaleString()} VNĐ</p>
                                     <p class="mb-3 text-success">Còn ${trip.availableSeats} ghế trống</p>
                                    <button class="btn btn-outline-primary w-100" onclick="openSeatMap(${trip.tripId})">Chọn Ghế</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });
    });

    // 2. Mở Modal Sơ đồ ghế
    function openSeatMap(tripId) {
        selectedTripId = tripId;
        selectedSeats = [];
        updateSeatSelectionUI();
        document.getElementById('custName').value = '';
        document.getElementById('custPhone').value = '';

        fetch(`/api/trips/${tripId}/seats`)
            .then(res => res.json())
            .then(seats => {
                const container = document.getElementById('seatContainer');
                container.innerHTML = '';

                // Vẽ sơ đồ ghế
                seats.forEach((seat, index) => {
                    // Tạo khoảng cách (lối đi) giữa xe nếu là ghế chẵn
                    if(index > 0 && index % 4 === 0) {
                        container.innerHTML += `<div class="aisle"></div>`;
                    }

                    const isDisable = (seat.status === 'PENDING' || seat.status === 'BOOKED');
                    container.innerHTML += `
                        <div class="seat ${seat.status}"
                             ${isDisable ? '' : `onclick="selectSeat(${seat.id}, '${seat.seatNumber}', this)"`}>
                            ${seat.seatNumber}
                        </div>
                    `;
                });
                seatModal.show();
            });
    }

    // 3. Xử lý click chọn ghế
    function selectSeat(id, seatNumber, element) {
        const index = selectedSeats.findIndex(s => s.id === id);
        if (index > -1) {
            // Deselect
            selectedSeats.splice(index, 1);
            element.classList.remove('SELECTED');
            element.classList.add('AVAILABLE');
        } else {
            // Select
            selectedSeats.push({id, number: seatNumber});
            element.classList.remove('AVAILABLE');
            element.classList.add('SELECTED');
        }
        updateSeatSelectionUI();
    }

    function updateSeatSelectionUI() {
        if (selectedSeats.length > 0) {
            const numbers = selectedSeats.map(s => s.number).join(', ');
            document.getElementById('selectedSeatLabel').innerText = numbers;
            document.getElementById('bookingForm').classList.remove('d-none');
            
            if (currentUser) {
                document.getElementById('customerInfoInputs').classList.remove('d-none');
                document.getElementById('custName').value = currentUser.fullName;
                document.getElementById('custPhone').value = currentUser.phone;
                document.getElementById('btnContinueBook').classList.remove('d-none');
                document.getElementById('authNotice').classList.add('d-none');
                document.getElementById('btnLoginToBook').classList.add('d-none');
            } else {
                document.getElementById('customerInfoInputs').classList.add('d-none');
                document.getElementById('authNotice').classList.remove('d-none');
                document.getElementById('btnContinueBook').classList.add('d-none');
                document.getElementById('btnLoginToBook').classList.remove('d-none');
            }
        } else {
            document.getElementById('selectedSeatLabel').innerText = 'Chưa chọn';
            document.getElementById('btnContinueBook').classList.add('d-none');
            document.getElementById('btnLoginToBook').classList.add('d-none');
            document.getElementById('bookingForm').classList.add('d-none');
        }
    }

    // 4. Chuyển hướng sang bước Đặt vé (CORE-06)
    document.getElementById('btnContinueBook').addEventListener('click', function() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        
        if(!name || !phone) {
            alert('Vui lòng nhập đầy đủ Họ tên và Số điện thoại!');
            return;
        }
        
        const seatIds = selectedSeats.map(s => s.id);
        const payload = {
            seatIds: seatIds,
            customerName: name,
            customerPhone: phone
        };
        
        const btn = document.getElementById('btnContinueBook');
        btn.disabled = true;
        btn.innerText = 'Đang xử lý...';
        
        const headers = {
            'Content-Type': 'application/json'
        };
        const token = localStorage.getItem('jwt_token');
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        
        fetch('/api/tickets/book', {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(payload)
        })
        .then(res => res.json().then(data => ({status: res.status, body: data})))
        .then(res => {
            btn.disabled = false;
            btn.innerText = 'Tiếp Tục Đặt Vé';
            
            if(res.status === 200) {
                let codes = res.body.tickets.map(t => t.ticketCode).join(', ');
                alert(`Đặt vé thành công!\nMã vé của bạn là: ${codes}\nVui lòng lưu lại mã vé để tra cứu.`);
                seatModal.hide();
                // refresh search list to update available seats
                document.getElementById('searchForm').dispatchEvent(new Event('submit'));
            } else {
                alert(`Lỗi: ${res.body.message}`);
            }
        })
        .catch(err => {
            btn.disabled = false;
            btn.innerText = 'Tiếp Tục Đặt Vé';
            alert('Có lỗi xảy ra khi đặt vé!');
        });
    });
</script>
</body>
</html>
